name: Daily SENTINEL Pipeline

on:
  schedule:
    - cron: '0 6 * * *'   # 2 AM America/New_York during daylight time
    - cron: '0 7 * * *'   # 2 AM America/New_York during standard time
  workflow_dispatch:

jobs:
  pipeline:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: 'requirements-ci.txt'

      - name: Check Eastern Time Gate
        id: eastern_time
        run: |
          echo "hour=$(TZ=America/New_York date +%H)" >> "$GITHUB_OUTPUT"
          echo "stamp=$(TZ=America/New_York date +'%Y-%m-%d %H:%M:%S %Z')" >> "$GITHUB_OUTPUT"

      - name: Skip Non-2AM Trigger
        if: github.event_name == 'schedule' && steps.eastern_time.outputs.hour != '02'
        run: |
          echo "Skipping scheduled run at ${{ steps.eastern_time.outputs.stamp }}."
          echo "This workflow waits for 2:00 AM America/New_York across DST."

      - name: Preflight secrets
        if: github.event_name != 'schedule' || steps.eastern_time.outputs.hour == '02'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          NEWSAPI_KEY: ${{ secrets.NEWSAPI_KEY }}
          ACLED_API_KEY: ${{ secrets.ACLED_API_KEY }}
          ACLED_EMAIL: ${{ secrets.ACLED_EMAIL }}
        run: |
          echo "## SENTINEL pipeline preflight" >> "$GITHUB_STEP_SUMMARY"
          if [ -n "$ANTHROPIC_API_KEY" ]; then
            echo "- ANTHROPIC_API_KEY: present" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "- ANTHROPIC_API_KEY: missing" >> "$GITHUB_STEP_SUMMARY"
            echo "ANTHROPIC_API_KEY is required for scripts/run_pipeline.py"
            exit 1
          fi
          if [ -n "$NEWSAPI_KEY" ]; then
            echo "- NEWSAPI_KEY: present" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "- NEWSAPI_KEY: missing (pipeline will skip NewsAPI)" >> "$GITHUB_STEP_SUMMARY"
          fi
          if [ -n "$ACLED_API_KEY" ] && [ -n "$ACLED_EMAIL" ]; then
            echo "- ACLED credentials: present" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "- ACLED credentials: incomplete (pipeline will skip ACLED)" >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Install dependencies
        if: github.event_name != 'schedule' || steps.eastern_time.outputs.hour == '02'
        run: pip install -r requirements-ci.txt

      - name: Run pipeline
        if: github.event_name != 'schedule' || steps.eastern_time.outputs.hour == '02'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          NEWSAPI_KEY:        ${{ secrets.NEWSAPI_KEY }}
          ACLED_API_KEY:      ${{ secrets.ACLED_API_KEY }}
          ACLED_EMAIL:        ${{ secrets.ACLED_EMAIL }}
          # Optional — weekly email digest
          DIGEST_TO:          ${{ secrets.DIGEST_TO }}
          DIGEST_FROM:        ${{ secrets.DIGEST_FROM }}
          SMTP_HOST:          ${{ secrets.SMTP_HOST }}
          SMTP_PORT:          ${{ secrets.SMTP_PORT }}
          SMTP_USER:          ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD:      ${{ secrets.SMTP_PASSWORD }}
        run: |
          python scripts/run_pipeline.py
          echo "## Ingest result" >> "$GITHUB_STEP_SUMMARY"
          python - <<'PY' >> "$GITHUB_STEP_SUMMARY"
          import json
          from pathlib import Path
          path = Path("data/events.json")
          if not path.exists():
              print("- data/events.json missing after pipeline run")
          else:
              payload = json.loads(path.read_text(encoding="utf-8"))
              events = payload.get("events", [])
              latest = max((event.get("date") or "" for event in events), default="unknown")
              print(f"- Stored events: {len(events)}")
              print(f"- Latest event date: {latest}")
          PY

      - name: Rebuild Downstream Layers
        if: github.event_name != 'schedule' || steps.eastern_time.outputs.hour == '02'
        run: |
          python scripts/qa/run_qa.py
          python scripts/qa/run_registry_qa.py
          python scripts/pipeline/detect_duplicates.py
          python scripts/analysis/build_country_monitors.py
          python scripts/analysis/validate_country_monitors.py
          python scripts/pipeline/build_canonical_events.py
          python scripts/pipeline/code_actors.py
          python scripts/review/build_review_queue.py
          python scripts/analysis/run_council.py
          python scripts/analysis/run_council_synthesis.py
          python scripts/analysis/validate_council_quality.py
          python scripts/publish/publish_dashboard_data.py
          echo "## Published output" >> "$GITHUB_STEP_SUMMARY"
          python - <<'PY' >> "$GITHUB_STEP_SUMMARY"
          import json
          from pathlib import Path
          path = Path("data/published/events_public.json")
          if not path.exists():
              print("- data/published/events_public.json missing after downstream rebuild")
          else:
              payload = json.loads(path.read_text(encoding="utf-8"))
              events = payload.get("events", [])
              latest = max((event.get("date") or "" for event in events), default="unknown")
              print(f"- Published events: {len(events)}")
              print(f"- Latest published date: {latest}")
          PY

      - name: Commit updated data
        if: github.event_name != 'schedule' || steps.eastern_time.outputs.hour == '02'
        run: |
          git config user.name  "sentinel-bot"
          git config user.email "sentinel-bot@users.noreply.github.com"
          git add data/
          git diff --staged --quiet || git commit -m "chore: daily pipeline refresh $(date -u +'%Y-%m-%d') [skip ci]"
          git push
